name: Node.js CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['*']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- 静的解析・セキュリティ ---
      - name: Run Prettier check
        run: npx prettier --check .

      - name: Run ESLint
        run: npx eslint .

      - name: Run security audit
        run: npm audit

      - name: Check for updates
        run: npx npm-check-updates

      # --- ユニットテスト (Vitest) ---
      # Vitest: story または feature ブランチ向け (差分実行)
      - name: Run vitest (changed files only)
        if: |
          contains(github.base_ref, 'story') || 
          contains(github.base_ref, 'feature')
        run: npx vitest run --changed

      # Vitest: main または develop ブランチ向け (全実行)
      - name: Run all vitest
        if: |
          github.base_ref == 'main' || 
          github.base_ref == 'develop'
        run: npx vitest run

      # --- E2Eテスト (Playwright) ---
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Playwright: story または feature ブランチ向け (差分実行)
      - name: Run Playwright tests (changed files only)
        if: |
          contains(github.base_ref, 'story') || 
          contains(github.base_ref, 'feature')
        run: npx playwright test --only-changed

      # Playwright: main または develop ブランチ向け (全実行)
      - name: Run all Playwright tests
        if: |
          github.base_ref == 'main' || 
          github.base_ref == 'develop'
        run: npx playwright test

      # 失敗時のレポート保存
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
